global:
  resolve_timeout: 30s

route:
  receiver: incident-bot
  group_by: ["alertname", "service", "severity", "instance"]
  group_wait: 1s
  group_interval: 5s
  repeat_interval: 1m

  routes:
    - match:
        severity: critical
      receiver: incident-bot
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      continue: true

    - match:
        severity: warning
      receiver: incident-bot
      group_wait: 1s
      group_interval: 10s
      repeat_interval: 1m
      continue: true

    - match:
        severity: info
      receiver: incident-bot
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 12h

receivers:
  - name: incident-bot
    webhook_configs:
      - url: "http://incident-bot:8000/webhook/alertmanager"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance", "service"]

  - source_match:
      alertname: ServiceDown
    target_match_re:
      alertname: ".+"
    equal: ["service", "instance"]

# ================================
# PROMETHEUS
# Solo: Prometheus + incident-bot
# ================================

global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    monitor: "incident-bot"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  # Prometheus se vigila a sí mismo
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "incident-bot"
    metrics_path: /metrics
    static_configs:
      - targets: ["incident-bot:8000"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
